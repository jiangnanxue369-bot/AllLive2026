name: Build UWP App

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest  # 使用最新镜像，追求速度
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1  # 自动匹配稳定版
    
    - name: Restore NuGet
      # 解决方案文件在根目录
      run: nuget restore AllLive.sln
    
    - name: Add Windows SDK to PATH
      run: echo "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x86" >> $GITHUB_PATH
    
    - name: Build UWP
      run: |
        msbuild AllLive.UWP/AllLive.UWP.csproj `
        /p:Configuration=Release `
        /p:Platform=x86 `
        /p:AppxPackageSigningEnabled=false `
        /p:UapAppxPackageBuildMode=SideloadOnly `
        /p:TargetPlatformVersion=10.0.19041.0 `
        /p:TargetPlatformMinVersion=10.0.18362.0
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: AllLive-Package
        path: AllLive.UWP/AppPackages/
