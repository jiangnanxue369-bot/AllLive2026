name: Build UWP App

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022 # 使用最全的镜像
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1
    
    # 解决方案文件在根目录
    - name: Restore NuGet
      run: nuget restore AllLive.sln
    
    - name: Build UWP
      run: |
        msbuild AllLive.UWP/AllLive.UWP.csproj `
        /p:Configuration=Release `
        /p:Platform=x86 `
        /p:AppxPackageSigningEnabled=false `
        /p:UapAppxPackageBuildMode=SideloadOnly `
        /p:TargetPlatformVersion=10.0.19041.0 `
        /p:TargetPlatformMinVersion=10.0.18362.0 `
        /p:WindowsSdkDir="C:\Program Files (x86)\Windows Kits\10\" `
        /p:AppxBundle=Never
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AllLive-UWP-Installer
        path: AllLive.UWP/AppPackages/
