name: Build UWP App

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019  # 锁定为windows-2019，UWP工具链最完整
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1  # 自动匹配稳定版
    
    - name: Restore NuGet
      # 解决方案文件在根目录
      run: nuget restore AllLive.sln
    
    - name: Build UWP
      run: |
        msbuild AllLive.UWP/AllLive.UWP.csproj `
        /p:Configuration=Release `
        /p:Platform=x86 `
        /p:AppxPackageSigningEnabled=false `
        /p:UapAppxPackageBuildMode=SideloadOnly `
        /p:TargetPlatformVersion=10.0.19041.0
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: AllLive-Package
        path: AllLive.UWP/AppPackages/
