name: Build UWP App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    # 改用 windows-2019，这个镜像对旧版 UWP 的兼容性最稳
    runs-on: windows-2019
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    # 这里改用 v1，GitHub 会自动匹配最新的稳定大版本，不会报错
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1
    
    - name: Restore NuGet packages
      run: nuget restore AllLive.sln
    
    - name: Build UWP App
      # 加入了 /p:AppxPackageSigningEnabled=false 彻底避开证书问题
      run: |
        msbuild AllLive.UWP/AllLive.UWP.csproj `
        /p:Configuration=Release `
        /p:Platform=x86 `
        /p:AppxPackageSigningEnabled=false `
        /p:UapAppxPackageBuildMode=SideloadOnly `
        /p:TargetPlatformVersion=10.0.19041.0
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AllLive-UWP-Package
        path: AllLive.UWP\AppPackages
